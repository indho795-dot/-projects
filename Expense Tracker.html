<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>project5</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #f4f4f4;
      }
      h1 {
        text-align: center;
        color: #333;
      }
      .summary-cards {
        display: flex;
        justify-content: space-around;
        margin-bottom: 20px;
      }
      .card {
        background-color: #fff;
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        width: 30%;
        text-align: center;
      }
      .blance {
        border-top: 5px solid #4caf50;
        font-size: 1rem;
        color: #4caf50;
      }
      .expenses {
        border-top: 5px solid #f44336;
        font-size: 1rem;
        color: #f44336;
      }
      .income {
        border-top: 5px solid #2196f3;
        font-size: 1em;
        color: #2196f3;
      }
      .transaction-form {
        background-color: #fff;
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        color: #555;
      }
      input[type="text"],
      input[type="number"],
      input[type="date"],
      select {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .form-row {
        display: flex;
        justify-content: space-between;
      }
      .form-row {
        width: 100%;
      }
      .form-group {
        width: 100%;
      }
      .form-acctions {
        text-align: right;
      }
      button {
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      #cancel-button {
        background-color: #f44336;
        color: #fff;
        margin-right: 10px;
      }
      #add-transaction {
        background-color: #4caf50;
        color: #fff;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        text-align: center;
      }
      .indho input {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>Expense Tracker</h1>
    <div class="summary-cards">
       <div class="card income">
        <h3>isoo gashay</h3>
        <p id="net-savings"></p>
      </div>
      <div class="card expenses">
        <h3>qasaare</h3>
        <p id="total-expense"></p>
      </div>
       <div class="card blance">
        <h3>isoo hadhay</h3>
        <p id="total-income"></p>
      </div>
    </div>

    <div class="transaction-form">
      <h2>Add New Transaction</h2>

      <form id="transactionForm">
        <div class="form-group">
          <label>Type</label>
          <select id="transaction-type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </div>

        <div class="form-group">
          <label>Description</label>
          <input type="text" id="description" />
        </div>

        <div class="form-row">
          <div class="form-group half">
            <label>Amount</label>
            <input type="number" id="amount" />
          </div>

          <div class="form-group half">
            <label>Category</label>
            <select id="category"></select>
          </div>
        </div>

        <div class="form-group">
          <label>Date</label>
          <input type="date" id="date" />
        </div>

        <div class="form-actions">
          <button type="button" id="cancel-button">Cancel</button>
          <button type="submit" id="add-btn">Add</button>
        </div>
   
  </form>
    <div class="transaction">
      <h2>Transaction History</h2>

      <input type="text" id="search" placeholder="Search transaction" />

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="transaction-list"></tbody>
      </table>

      <p id="no-transaction">No transactions found</p>
    </div>

    <!-- JS FILE -->
    <script src="Expense Tracker.js"></script>
  </body>
</html>
