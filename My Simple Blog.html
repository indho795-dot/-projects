<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<head>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f4f6f8;
  padding: 20px;
}

/* Container */
.container {
  max-width: 1000px;
  margin: auto;
}

/* Header */
header {
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  margin-top: 15px;
}

.container h1 {
    text-align: center;
    font-size: 2.5rem;
   
}

/* Buttons */
.btn {
  background: #007bff;
  color: #fff;
  border: none;
  padding: 10px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 20px;
}

.btn:hover {
  background: #0056b3;
}
.dangar{
  color: white;
  background-color: red;
}

.btn-outline {
  background: transparent;
  border: 1px solid #007bff;
  color: #007bff;


}

.btn-outline:hover {
  background: #007bff;
  color: #fff;
}

/* Posts Grid */
.posts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
}

/* Modal */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
}

/* JS will toggle this */
.modal.active {
  display: flex;
    opacity: 1;
    
}

/* Modal Content */
.modal-content {
  background: #fff;
  width: 100%;
  max-width: 500px;
  border-radius: 8px;
  overflow: hidden;
  animation: fadeIn 0.3s ease;
}

/* Modal Header */
.modal-header {
  padding: 15px 20px;
  background: #f1f1f1;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-title {
  font-size: 18px;
  color: #333;
}

.close-btn {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: #555;
}

/* Modal Body */
.modal-body {
  padding: 20px;
}

/* Modal Footer */
.modal-footer {
  padding: 15px 20px;
  background: #f9f9f9;
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* Form */
.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  margin-bottom: 6px;
  color: #444;
  font-size: 14px;
}

.form-control {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
}

.form-control:focus {
  outline: none;
  border-color: #007bff;
}

/* Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}
  </style>
</head>
<body>

<div class="container">
    <h1>My Simple Blog</h1>
  <header>
    <button id="newPostBtn" class="btn">Create New Post</button>
  </header>

  <div id="postsContainer" class="posts-grid">
    <!-- Posts will be inserted here by JavaScript -->
  </div>
</div>

<!-- Blog Form Modal -->
<div id="blogModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">New Blog Post</h2>
      <button class="close-btn">&times;</button>
    </div>

    <form id="blogForm">
      <div class="modal-body">
        <input type="hidden" id="postId">

        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" class="form-control" id="title" required>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea class="form-control" id="description" required></textarea>
        </div>

        <div class="form-group">
          <label for="image">Image URL</label>
          <input type="url" class="form-control" id="image">
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn">Save Post</button>
      </div>
    </form>
  </div>
</div>

<!-- View Post Modal -->
<div id="viewModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title" id="viewModalTitle"></h2>
      <button class="close-btn">&times;</button>
      <delete>
    </div>

    <div class="modal-body" id="viewModalBody">
      <!-- Content will be inserted here by JavaScript -->
    </div>

    <div class="modal-footer">
      <button type="button" class="btn" id="closeViewBtn">Close</button>
    </div>
  </div>
</div>


<script src="My Simple Blog.js"></script>
    
</body>
</html>
